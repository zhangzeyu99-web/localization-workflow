  <text x="690" y="243" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Output: QA findings</text>
  <rect x="704" y="300" width="260" height="36" rx="8" fill="#dcfce7"/>
